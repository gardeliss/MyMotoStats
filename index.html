<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moto Stats Pro</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; padding-bottom: 80px; }
        .tab-content { display: none; }
        .active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 50; }
        .modal.open { display: flex; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.8rem; }
        .has-ride { background-color: #ea580c; font-weight: bold; }
    </style>
</head>
<body>

    <header class="p-4 text-center border-b border-gray-800 sticky top-0 bg-[#121212] z-40">
        <h1 class="text-xl font-bold text-orange-500">Moto Tracker 🏍️</h1>
    </header>

    <main class="p-4">
        <section id="stats" class="tab-content active space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-gray-800 p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-400">30 Ημέρες</p>
                    <h2 id="count-month" class="text-3xl font-bold">0</h2>
                </div>
                <div class="bg-gray-800 p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-400">6 Μήνες</p>
                    <h2 id="count-6month" class="text-3xl font-bold">0</h2>
                </div>
                <div class="bg-gray-800 p-4 rounded-xl text-center">
                    <p class="text-xs text-gray-400">Έτος</p>
                    <h2 id="count-year" class="text-3xl font-bold">0</h2>
                </div>
                <div class="bg-orange-900/30 p-4 rounded-xl text-center border border-orange-500/30">
                    <p class="text-xs text-orange-400">Μ.Ο. / Μήνα</p>
                    <h2 id="avg-month" class="text-3xl font-bold text-orange-500">0</h2>
                </div>
            </div>
        </section>

        <section id="calendar-tab" class="tab-content space-y-4">
            <div class="bg-gray-800 p-4 rounded-xl">
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="p-2 text-orange-500 font-bold text-xl">&lt;</button>
                    <h3 id="current-month-display" class="font-bold">Μήνας Έτος</h3>
                    <button onclick="changeMonth(1)" class="p-2 text-orange-500 font-bold text-xl">&gt;</button>
                </div>
                <div class="calendar-grid text-gray-400 text-xs text-center mb-2">
                    <div>Δε</div><div>Τρ</div><div>Τε</div><div>Πε</div><div>Πα</div><div>Σα</div><div>Κυ</div>
                </div>
                <div id="calendar-days" class="calendar-grid"></div>
            </div>
            <div id="rides-list" class="space-y-2 mt-4"></div>
        </section>
    </main>

    <div id="addModal" class="modal">
        <div class="bg-gray-800 p-6 rounded-2xl w-80 space-y-4">
            <h3 class="text-lg font-bold">Νέα Εγγραφή</h3>
            <input type="date" id="newRideDate" class="w-full bg-gray-700 p-3 rounded-lg text-white outline-none border border-gray-600">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 p-3 bg-gray-600 rounded-lg">Ακύρωση</button>
                <button onclick="saveRide()" class="flex-1 p-3 bg-orange-600 rounded-lg font-bold">Αποθήκευση</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-gray-900 border-t border-gray-800 flex justify-around items-center p-3 z-50">
        <button onclick="showTab('stats')" class="flex flex-col items-center text-gray-400 focus:text-orange-500">
            <span class="text-xs">Stats</span>
        </button>
        <button onclick="openModal()" class="bg-orange-600 h-14 w-14 rounded-full flex items-center justify-center shadow-lg transform -translate-y-4 border-4 border-[#121212]">
            <span class="text-2xl font-bold">+</span>
        </button>
        <button onclick="showTab('calendar-tab')" class="flex flex-col items-center text-gray-400 focus:text-orange-500">
            <span class="text-xs">History</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA5M7jENV0jiOuoSZ2It6OnpW0DZyj5gVM",
            authDomain: "mymotostats.firebaseapp.com",
            projectId: "mymotostats",
            storageBucket: "Ymymotostats.firebasestorage.app",
            messagingSenderId: "898195325752",
            appId: "1:898195325752:web:303e69e1656ec5f0ec37cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allRides = [];
        let viewDate = new Date();

        // Modal Controls
        window.openModal = () => {
            document.getElementById('newRideDate').valueAsDate = new Date();
            document.getElementById('addModal').classList.add('open');
        };
        window.closeModal = () => document.getElementById('addModal').classList.remove('open');

        // Save Data
        window.saveRide = async () => {
            const dateVal = document.getElementById('newRideDate').value;
            if(!dateVal) return;
            try {
                await addDoc(collection(db, "rides"), { date: dateVal, timestamp: new Date(dateVal) });
                closeModal();
                loadData();
            } catch (e) { alert("Error saving!"); }
        };

        // Delete Data
        window.deleteRide = async (id) => {
            if(confirm("Διαγραφή αυτής της βόλτας;")) {
                await deleteDoc(doc(db, "rides", id));
                loadData();
            }
        };

        // Load & Process Data
        async function loadData() {
            const q = query(collection(db, "rides"), orderBy("date", "desc"));
            const snap = await getDocs(q);
            allRides = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderStats();
            renderCalendar();
        }

        function renderStats() {
            const now = new Date();
            const getCount = (days) => {
                const limit = new Date();
                limit.setDate(now.getDate() - days);
                return allRides.filter(r => new Date(r.date) >= limit).length;
            };

            document.getElementById('count-month').innerText = getCount(30);
            document.getElementById('count-6month').innerText = getCount(180);
            document.getElementById('count-year').innerText = getCount(365);

            // Μέσος Όρος: Υπολογίζουμε πόσοι μήνες έχουν περάσει από την πρώτη βόλτα μέχρι σήμερα
            if(allRides.length > 0) {
                const firstDate = new Date(allRides[allRides.length -1].date);
                const diffMonths = Math.max(1, (now.getFullYear() - firstDate.getFullYear()) * 12 + (now.getMonth() - firstDate.getMonth()) + 1);
                document.getElementById('avg-month').innerText = (allRides.length / diffMonths).toFixed(1);
            }
        }

        window.changeMonth = (dir) => {
            viewDate.setMonth(viewDate.getMonth() + dir);
            renderCalendar();
        };

        function renderCalendar() {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay() || 7;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            document.getElementById('current-month-display').innerText = 
                new Intl.DateTimeFormat('el-GR', { month: 'long', year: 'numeric' }).format(viewDate);

            let html = '';
            for(let i=1; i<firstDay; i++) html += '<div></div>';
            
            const monthRides = allRides.filter(r => new Date(r.date).getMonth() === month && new Date(r.date).getFullYear() === year);
            const rideDates = monthRides.map(r => new Date(r.date).getDate());

            for(let d=1; d<=daysInMonth; d++) {
                const isRide = rideDates.includes(d) ? 'has-ride' : 'bg-gray-700/30';
                html += `<div class="calendar-day ${isRide}">${d}</div>`;
            }
            document.getElementById('calendar-days').innerHTML = html;

            // List below calendar
            document.getElementById('rides-list').innerHTML = monthRides.map(r => `
                <div class="bg-gray-800 p-3 rounded-lg flex justify-between items-center border-l-4 border-orange-500">
                    <span>${new Date(r.date).toLocaleDateString('el-GR')}</span>
                    <button onclick="deleteRide('${r.id}')" class="text-red-500 text-xs font-bold">Διαγραφή</button>
                </div>
            `).join('');
        }

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        loadData();
    </script>
</body>
</html>
