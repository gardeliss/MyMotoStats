<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto Stats</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .tab-content { display: none; }
        .active { display: block; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-6 text-center border-b border-gray-800">
        <h1 class="text-2xl font-bold text-orange-500">My Moto Rides 🏍️</h1>
    </header>

    <main class="flex-grow overflow-y-auto p-4">
        
        <section id="stats" class="tab-content active space-y-4">
            <div class="grid grid-cols-1 gap-4">
                <div class="bg-gray-800 p-6 rounded-2xl text-center">
                    <p class="text-gray-400">Τελευταίες 30 ημέρες</p>
                    <h2 id="count-month" class="text-5xl font-black text-white">0</h2>
                </div>
                <div class="bg-gray-800 p-6 rounded-2xl text-center">
                    <p class="text-gray-400">Τελευταίο 6μηνο</p>
                    <h2 id="count-6month" class="text-4xl font-bold text-white">0</h2>
                </div>
                <div class="bg-gray-800 p-6 rounded-2xl text-center">
                    <p class="text-gray-400">Τελευταίο Έτος</p>
                    <h2 id="count-year" class="text-4xl font-bold text-white">0</h2>
                </div>
            </div>
        </section>

        <section id="calendar" class="tab-content">
            <h3 class="text-xl mb-4">Ιστορικό Διαδρομών</h3>
            <div id="rides-list" class="space-y-2">
                </div>
        </section>
    </main>

    <nav class="bg-gray-900 border-t border-gray-800 flex justify-around p-4">
        <button onclick="showTab('stats')" class="text-orange-500">Στατιστικά</button>
        <button onclick="addRide()" class="bg-orange-600 px-6 py-2 rounded-full font-bold">+ Ride</button>
        <button onclick="showTab('calendar')" class="text-orange-500">Ιστορικό</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- ΑΝΤΙΚΑΤΑΣΤΗΣΕ ΜΕ ΤΑ ΔΙΚΑ ΣΟΥ KEYS ΑΠΟ ΤΟ FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5M7jENV0jiOuoSZ2It6OnpW0DZyj5gVM",
            authDomain: "mymotostats.firebaseapp.com",
            projectId: "mymotostats",
            storageBucket: "mymotostats.firebasestorage.app",
            messagingSenderId: "898195325752",
            appId: "1:898195325752:web:303e69e1656ec5f0ec37cd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Λειτουργία προσθήκης βόλτας
        window.addRide = async () => {
            const date = new Date().toISOString().split('T')[0]; // Σημερινή ημερομηνία YYYY-MM-DD
            try {
                await addDoc(collection(db, "rides"), { date: date, timestamp: new Date() });
                alert("Η βόλτα καταγράφηκε! ✌️");
                loadData();
            } catch (e) { console.error("Error: ", e); }
        };

        // Φόρτωση και υπολογισμός στατιστικών
        async function loadData() {
            const q = query(collection(db, "rides"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            const rides = [];
            querySnapshot.forEach((doc) => rides.push(doc.data().date));

            const now = new Date();
            const countSince = (days) => {
                const limit = new Date();
                limit.setDate(now.getDate() - days);
                return rides.filter(d => new Date(d) >= limit).length;
            };

            document.getElementById('count-month').innerText = countSince(30);
            document.getElementById('count-6month').innerText = countSince(180);
            document.getElementById('count-year').innerText = countSince(365);

            document.getElementById('rides-list').innerHTML = rides.map(r => 
                `<div class="bg-gray-700 p-3 rounded-lg">${new Date(r).toLocaleDateString('el-GR')}</div>`
            ).join('');
        }

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        loadData();
    </script>
</body>
</html>
